name: Deploy to EC2

on:
  workflow_dispatch:  # Solo se ejecuta manualmente desde GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            REPO_DIR="${{ vars.DEPLOY_DIR || '~/movia' }}"

            # Clone o pull
            if [ ! -d "$REPO_DIR" ]; then
              git clone ${{ github.server_url }}/${{ github.repository }}.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}

            # Crear .env con secrets (nunca queda en git)
            cd model
            echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > .env

            # Build y restart
            docker compose down --remove-orphans || true
            docker compose build --no-cache
            docker compose up -d

            # Health check
            echo "Esperando health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost/health > /dev/null 2>&1; then
                echo "Healthy!"
                exit 0
              fi
              sleep 2
            done
            echo "::warning::Health check timeout"
